name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Rust tests
        run: cargo test --workspace

      - name: Modularity guard
        run: ./scripts/check_modularity.sh

      - name: Check generated bindings are up to date
        run: ./scripts/check_bindings.sh

      - name: Check ABI compatibility
        run: ./scripts/check_abi_compat.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Web smoke typecheck
        run: |
          npm --prefix ./bindings/web install
          npm --prefix ./bindings/web run typecheck

      - name: Web runtime tests
        run: npm --prefix ./bindings/web run test

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Build npm package
        run: |
          npm --prefix ./bindings/web install
          npm --prefix ./bindings/web run build

      - name: Pack npm tarball
        run: npm --prefix ./bindings/web run pack:local

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist/npm/*.tgz

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusted-geom-wasm
          path: bindings/web/dist/wasm/rusted_geom.wasm

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/artifacts/npm-package/*.tgz
            dist/artifacts/rusted-geom-wasm/rusted_geom.wasm
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist/npm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish dist/npm/*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
