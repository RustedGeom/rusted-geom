name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Rust tests
        run: cargo test --workspace

      - name: Modularity guard
        run: ./scripts/check_modularity.sh

      - name: Check generated bindings are up to date
        run: bash ./scripts/check_bindings.sh

      - name: Check ABI compatibility
        run: bash ./scripts/check_abi_compat.sh

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM for tests
        run: wasm-pack build --target web --release --out-dir pkg crates/kernel

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Web smoke typecheck
        run: |
          npm --prefix ./bindings/web ci --include=dev
          npm --prefix ./bindings/web run typecheck

      - name: Run benchmark smoke
        run: |
          cargo bench -p kernel --bench bounds_bench -- --noplot --sample-size 10 --warm-up-time 0.1 --measurement-time 0.2
          cargo bench -p kernel --bench curve_bench -- --noplot --sample-size 10 --warm-up-time 0.1 --measurement-time 0.2
          python3 ./scripts/check_benchmark_thresholds.py

      - name: Web runtime tests
        run: npm --prefix ./bindings/web run test

  build:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        run: wasm-pack build --target web --release --out-dir pkg crates/kernel

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Build npm package
        run: |
          npm --prefix ./bindings/web ci --include=dev
          npm --prefix ./bindings/web run build

      - name: Pack npm tarball
        run: npm --prefix ./bindings/web run pack:local

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist/npm/*.tgz

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rusted-geom-wasm
          path: bindings/web/dist/wasm/rusted_geom.wasm

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/artifacts/npm-package/*.tgz
            dist/artifacts/rusted-geom-wasm/rusted_geom.wasm
          generate_release_notes: true

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist/npm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: npm publish dist/npm/*.tgz
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-showcase:
    needs: checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Build WASM package
        run: wasm-pack build --target web --release --out-dir pkg crates/kernel

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build showcase
        run: pnpm --filter showcase build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel
        run: |
          mkdir -p showcase/out/.vercel
          echo '{"projectId":"${{ secrets.VERCEL_PROJECT_ID }}","orgId":"${{ secrets.VERCEL_ORG_ID }}"}' > showcase/out/.vercel/project.json
          vercel deploy showcase/out --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
