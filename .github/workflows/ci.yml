name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Rust tests
        run: cargo test --workspace

      - name: Check generated bindings are up to date
        run: ./scripts/check_bindings.sh

      - name: Check ABI compatibility
        run: ./scripts/check_abi_compat.sh

      - name: Stage ABI/API snapshots
        run: |
          mkdir -p dist/ci
          cp ./target/abi/rgm_abi.json ./dist/ci/rgm_abi.json
          cp ./bindings/web/src/generated/function_catalog.json ./dist/ci/function_catalog.json

      - name: Upload ABI/API snapshots
        uses: actions/upload-artifact@v4
        with:
          name: abi-api-snapshots
          path: ./dist/ci

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Web smoke typecheck
        run: |
          npm --prefix ./bindings/web install
          npm --prefix ./bindings/web run typecheck

      - name: Web runtime tests
        run: npm --prefix ./bindings/web run test

      - name: Web package smoke build
        run: npm --prefix ./bindings/web run build
