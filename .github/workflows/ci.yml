name: ci

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add wasm32 target
        run: rustup target add wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Rust tests
        run: cargo test -p kernel

      - name: Modularity guard
        run: ./scripts/check_modularity.sh

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build WASM for tests
        run: wasm-pack build --target web --release --out-dir pkg crates/kernel

      - name: Web smoke typecheck
        run: |
          npm --prefix ./bindings/web ci --include=dev
          npm --prefix ./bindings/web run typecheck

      - name: Web runtime tests
        run: npm --prefix ./bindings/web run test

      - name: Web package smoke build
        run: npm --prefix ./bindings/web run build

  benchmark-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build benchmark targets
        run: cargo bench -p kernel --no-run

      - name: Run bounds smoke benchmark
        run: cargo bench -p kernel --bench bounds_bench -- --noplot --sample-size 10 --warm-up-time 0.1 --measurement-time 0.2

      - name: Run curve smoke benchmark
        run: cargo bench -p kernel --bench curve_bench -- --noplot --sample-size 10 --warm-up-time 0.1 --measurement-time 0.2

      - name: Check benchmark thresholds
        run: python3 ./scripts/check_benchmark_thresholds.py

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: criterion-smoke
          path: target/criterion
